<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Feedback EPICODE</title>
    <link rel="stylesheet" href="./assets/style/reset-style.css" />
    <link rel="stylesheet" href="./assets/style/normalize.css" />
    <link rel="stylesheet" href="./assets/style/style-base.css" />
  </head>
  <body>
    <div class="contenitore-generale">
      <header class="header">
        <div class="logo">
          <img src="./assets/img/epicode_logo.png" alt="Logo Epicode" />
        </div>
      </header>
      <main class="text-center">
        <h2>Tell us how it's going</h2>

        <p class="subtitle">
          From 0 to 10, how likely are you to recommend EPICODE to a friend or a
          colleague?
        </p>

        <div id="stelline"></div>

        <p class="subtitle">
          Leave us an open feedback about your experience so far
        </p>

        <div class="feedback-box">
          <textarea placeholder="Write your comment here"></textarea>
        </div>
        <div id="btn-pagina-feedback">
          <button class="btn" id="btn-invio">INVIO</button>
          <button id="btn-more-info">MORE INFO</button>
        </div>
      </main>
    </div>
    <script src="./assets/script/script-stelle.js"></script>
  </body>
</html>
