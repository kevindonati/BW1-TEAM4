<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Feedback EPICODE</title>
  <link rel="stylesheet" href="assets/style/paginafeedback.css">
  
</head>
<header class="header">
    <img src="assets/img/epicode_logo.png" alt="epicode_logo" class="logo">
</header>
<body>

  <div class="contenitore-generale">

    <h2>Tell us how it's going</h2>

    <p class="subtitle">
      From 0 to 10, how likely are you to recommend EPICODE
      to a friend or a colleague?
    </p>

    <div class="stars">
      <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
    </div>

    <div class="feedback-box">
      <textarea placeholder="Write your comment here"></textarea>
    </div>

    <button class="btn">MORE INFO</button>

  </div>

</body>
</html>
