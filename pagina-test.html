<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina Test</title>
    <link rel="stylesheet" href="./assets/style/reset-style.css" />
    <link rel="stylesheet" href="./assets/style/normalize.css" />
    <link rel="stylesheet" href="./assets/style/style-base.css" />
    <link rel="stylesheet" href="pagina-results.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
  </head>
  <body>
    <div id="cambia-pagina" class="contenitore-generale">
      <header>
        <div>
          <!-- Logo Epicode in alto a sinistra -->
          <!-- A questo div metterei una classe differente rispetto agli altri div con il logo epicode -->
          <!-- Perchè a sinistra dell'header c'è un altro div con il cronometro -->
          <img
            class="logo"
            src="./assets/img/epicode_logo.png"
            alt="Logo Epicode"
          />
        </div>
        <div class="timer-container">
          <!-- Div Timer -->
          <!-- Per modificarlo con CSS e JS  https://www.youtube.com/watch?v=C74_04bamJA // https://www.javaspring.net/blog/how-to-create-a-circular-countdown-timer-using-html-css-or-javascript/-->

          <svg class="timer-svg" viewBox="0 0 100 100">
            <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
            <circle class="progresso-timer" cx="50" cy="50" r="45"></circle>
          </svg>
          <p class="numeri-timer">10</p>
        </div>
      </header>
      <main>
        <!-- SELEZIONA DIFFICOLTà -->
        <form id="form-difficoltà">
          <label for="scelta">Scegli un'opzione di difficoltà:</label>
          <select name="scelta" id="scelta">
            <option value="facile">facile</option>
            <option value="medio">medio</option>
            <option value="difficile">difficile</option>
            <option value="progressiva">progressiva</option>
          </select>
          <button type="submit">Inizia il quiz</button>
        </form>
        <!-- Div delle domande del quiz -->
        <div id="testo-domanda">
          <h2>Seleziona la difficoltà e premi il bottone per iniziare</h2>
        </div>
        <!-- Form con i button per le risposte-->
        <form id="form-domande">
          <div>
            <button class="no-display" id="risposta-1" type="button">
              Risposta 1
            </button>
          </div>
          <div>
            <button class="no-display" id="risposta-2" type="button">
              Risposta 2
            </button>
          </div>
          <div>
            <button class="no-display" id="risposta-3" type="button">
              Risposta 3
            </button>
          </div>
          <div>
            <button class="no-display" id="risposta-4" type="button">
              Risposta 4
            </button>
          </div>
        </form>
        <!-- Div ordine domande -->
        <div id="numero-domande">
          <button class="no-display" onclick="mostraRisultati()">
            Scopri i risultati
          </button>
          <!-- Bottone di prova per vedere l'innerText cambiare DA RIMUOVERE-->
          <p>QUESTION 1/10</p>
        </div>
      </main>
      <footer></footer>
    </div>
    <script src="./assets/script/script.js"></script>
  </body>
</html>
