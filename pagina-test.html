<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagina Test</title>
    <link rel="stylesheet" href="./assets/style/reset-style.css" />
    <link rel="stylesheet" href="./assets/style/normalize.css" />
    <link rel="stylesheet" href="./assets/style/style-base.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
  </head>
  <body>
    <div id="cambia-pagina" class="contenitore-generale">
      <header>
        <div class="logo">
          <img src="./assets/img/epicode_logo.png" alt="Logo Epicode" />
        </div>
        <div class="timer-container">
          <svg class="timer-svg" viewBox="0 0 100 100">
            <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
            <circle class="progresso-timer" cx="50" cy="50" r="45"></circle>
          </svg>
          <div class="numeri-timer">
            <span class="testo-piccolo">SECONDS</span>
            <span id="countdown-numero">10</span>
            <span class="testo-piccolo">REMAINING</span>
          </div>
        </div>
      </header>
      <main>
        <!-- Div delle domande del quiz -->
        <div id="testo-domanda">
          <h2>Seleziona la difficoltà e premi il bottone per iniziare</h2>
        </div>

        <!-- SELEZIONA DIFFICOLTà -->
        <form id="form-difficoltà">
          <label for="scelta">Scegli un'opzione di difficoltà:</label>

          <div class="dropdown">
            <button id="dropbtn">difficoltà &#9660;</button>
            <div class="dropdown-content">
              <ul>
                <li class="single-difficulty" onclick="changeDifficulty(0)" href="#">facile</li>
                <li class="single-difficulty" onclick="changeDifficulty(1)" href="#">medio</li>
                <li class="single-difficulty" onclick="changeDifficulty(2)" href="#">difficile</li>
                <li class="single-difficulty" onclick="changeDifficulty(3)" href="#">
                  progressiva
                </li>
              </ul>
            </div>
          </div>

          <!-- <select name="scelta" id="scelta">
            <option value="facile">facile</option>
            <option value="medio">medio</option>
            <option value="difficile">difficile</option>
            <option value="progressiva">progressiva</option>
          </select> -->

          <button onclick="inizioContoRovescia()" class="btn" type="submit">Inizia il quiz</button>
        </form>
        <p id="spiegazione-progressiva">
          &#42; Difficoltà progressiva: con l'aumentare delle risposte corrette, anche la difficoltà
          aumenterà.
        </p>
        <!-- Form con i button per le risposte-->
        <div id="contenitore-form-bottoni" class="no-display">
          <form id="form-domande">
            <div>
              <button class="no-display btn-risposte" id="risposta-1" type="button">
                Risposta 1
              </button>
            </div>
            <div>
              <button class="no-display btn-risposte" id="risposta-2" type="button">
                Risposta 2
              </button>
            </div>
            <div>
              <button class="no-display btn-risposte" id="risposta-3" type="button">
                Risposta 3
              </button>
            </div>
            <div>
              <button class="no-display btn-risposte" id="risposta-4" type="button">
                Risposta 4
              </button>
            </div>
            <div class="text-center">
              <button class="no-display" id="prossima-domanda" type="button">
                Prossima domanda
              </button>
            </div>
          </form>
        </div>
        <!-- Div ordine domande -->
        <div id="numero-domande" class="text-center">
          <button class="no-display" onclick="mostraRisultati()">Scopri i risultati</button>
          <p class="no-display" id="question-count">QUESTION 1 <span>/ 10</span></p>
        </div>
      </main>
      <footer></footer>
    </div>
    <script src="./assets/script/script.js"></script>
    <canvas
      id="confetti-canvas"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
      "></canvas>
  </body>
</html>
