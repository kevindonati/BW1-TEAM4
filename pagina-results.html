<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Results</title>
    <link rel="stylesheet" href="./assets/style/reset-style.css" />
    <link rel="stylesheet" href="./assets/style/normalize.css" />
    <link rel="stylesheet" href="./assets/style/style-base.css" />
    <link rel="stylesheet" href="pagina-results.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="contenitore-generale">
      <header>
        <div>
          <img class="logo" src="./assets/img/epicode_logo.png" />
        </div>
      </header>

      <main class="results-page">
        <section class="titolo">
          <h1>Results</h1>
          <p>The summary of your answers:</p>
        </section>

        <section class="content">
          <div class="side side-left">
            <h2>Correct</h2>
            <div class="percent">66.7%</div>
            <p>4/6 questions</p>
          </div>

          <div class="grafico">
            <canvas id="grafico-a-torta" style="width: 100%; max-width: 600px">
              <div class="chart-inner">
                <h3>Congratulations!</h3>
                <p class="highlight">You passed the exam.</p>
                <p>We'll send you the certificate in few minutes.</p>
                <p>Check your email (including promotions / spam folder)</p>
              </div>
            </canvas>
          </div>

          <div class="side side-right">
            <h2>Wrong</h2>
            <div class="percent">33.3%</div>
            <p>2/6 questions</p>
          </div>
        </section>

        <div class="button-wrapper">
          <button>RATE US</button>
        </div>
      </main>
    </div>
    <script src="./assets/script/grafico.js"></script>
  </body>
</html>
